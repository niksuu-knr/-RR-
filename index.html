<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --lidl-blue: #0050aa;
            --lidl-light-blue: #00a0e2;
            --lidl-red: #df0000;
            --lidl-green: #2e7d32;
            --lidl-yellow: #ffeb3b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; height: 100vh; background: #f0f0f0; }

        /* VASEN PUOLI: KUITTI */
        #left-panel { display: grid; grid-template-rows: 1fr 220px; border-right: 3px solid #ccc; background: white; }
        .receipt { padding: 20px; overflow-y: auto; font-family: monospace; font-size: 1.2rem; }
        .receipt-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #eee; }

        .left-controls {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; background: #e0e0e0;
        }

        /* OIKEA PUOLI: NÄPPÄIMISTÖ JA TILAT */
        #right-panel { display: grid; grid-template-rows: 80px 1fr; background: white; }
        .total-display { 
            background: var(--lidl-blue); color: white; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 25px; 
            font-size: 2.2rem; font-weight: bold; 
        }

        .numpad-area { display: grid; grid-template-columns: 1fr 140px; gap: 12px; padding: 20px; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        button { border: 1px solid #bbb; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.98); }

        .btn-num { background: var(--lidl-light-blue); color: white; height: 80px; font-size: 1.8rem; }
        .btn-action { background: #fff; font-size: 1rem; color: #333; }
        
        .btn-red { background: var(--lidl-red); color: white; }
        .btn-green { background: var(--lidl-green); color: white; }
        .btn-ma { background: var(--lidl-yellow); color: #000; font-size: 1.5rem; }

        .sidebar { display: flex; flex-direction: column; gap: 10px; }
        .hidden { display: none; }

        #payment-status { font-size: 1rem; color: #fff; opacity: 0.8; }
    </style>
</head>
<body>

<!-- VASEN PANEELI -->
<div id="left-panel">
    <div class="receipt" id="receipt-content">
        <div class="receipt-item"><span>MAITO 1.5L</span><span>1,45 €</span></div>
        <div class="receipt-item"><span>BANAANI KG</span><span>1,29 €</span></div>
        <div class="receipt-item"><span>RUISLEIPÄ</span><span>2,10 €</span></div>
    </div>
    <div class="left-controls">
        <button class="btn-action">PAISTO</button>
        <button class="btn-action">HEVI</button>
        <button class="btn-red">PERUUTA</button>
        <button class="btn-action">POISTA</button>
        <button class="btn-action">MÄÄRÄ</button>
        <button class="btn-green">SYÖTÄ</button>
    </div>
</div>

<!-- OIKEA PANEELI -->
<div id="right-panel">
    <div class="total-display">
        <span id="payment-status">EUR</span>
        <span id="grand-total">4,84 €</span>
    </div>
    
    <div class="numpad-area">
        <!-- Numerot (image_2.png & image_3.png) -->
        <div class="numpad-grid">
            <button class="btn-num">7</button><button class="btn-num">8</button><button class="btn-num">9</button>
            <button class="btn-num">4</button><button class="btn-num">5</button><button class="btn-num">6</button>
            <button class="btn-num">1</button><button class="btn-num">2</button><button class="btn-num">3</button>
            <button class="btn-num">0</button><button class="btn-num">00</button><button class="btn-num">,</button>
        </div>

        <!-- KASSANÄKYMÄN SIVUPALKKI (image_2.png) -->
        <div id="side-kassa" class="sidebar">
            <button class="btn-num btn-green" style="height: 80px;">PLU</button>
            <button class="btn-action" style="height: 80px;">KPL</button>
            <!-- TÄMÄ ON "MA" PAINIKE -->
            <button class="btn-ma" style="height: 170px;" onclick="goToPayment()">MA</button>
        </div>

        <!-- MAKSUNÄKYMÄN SIVUPALKKI (image_3.png) -->
        <div id="side-maksu" class="sidebar hidden">
            <button class="btn-action" style="height: 80px;">Lahja-<br>kortti</button>
            <button class="btn-action" style="height: 80px;">Kortti /<br>CB</button>
            <button class="btn-action" style="height: 80px;">Kortti</button>
            <button class="btn-num btn-green" style="height: 80px;" onclick="completePayment()">Bar</button>
        </div>
    </div>
</div>

<script>
    // Siirtyminen maksunäkymään "MA"-painikkeesta (image_2.png -> image_3.png)
    function goToPayment() {
        // Vaihdetaan sivupalkin painikkeet
        document.getElementById('side-kassa').classList.add('hidden');
        document.getElementById('side-maksu').classList.remove('hidden');
        
        // Päivitetään yläpalkin teksti
        document.getElementById('payment-status').innerText = "VALITSE MAKSUTAPA";
    }

    // Maksun päättäminen (paluu perusnäkymään)
    function completePayment() {
        alert("Maksu suoritettu. Kiitos käynnistä!");
        
        // Resetoidaan näkymä
        document.getElementById('side-maksu').classList.add('hidden');
        document.getElementById('side-kassa').classList.remove('hidden');
        document.getElementById('payment-status').innerText = "EUR";
        
        // Tyhjennetään kuitti demoa varten
        document.getElementById('receipt-content').innerHTML = "";
        document.getElementById('grand-total').innerText = "0,00 €";
    }
</script>

</body>
</html>
