<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --lidl-blue: #0050aa;
            --lidl-light-blue: #00a0e2;
            --lidl-red: #df0000;
            --lidl-green: #2e7d32;
            --lidl-yellow: #ffeb3b;
        }

        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; height: 100vh; background: #eee; }

        /* VASEN PUOLI: KUITTI */
        #left-panel { display: grid; grid-template-rows: 1fr 200px; border-right: 2px solid #ccc; background: white; }
        .receipt { padding: 10px; overflow-y: auto; font-size: 1.2rem; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; }

        .item-controls {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #d1d4d9;
        }

        /* OIKEA PUOLI: NÄPPÄIMISTÖ */
        #right-panel { display: grid; grid-template-rows: 80px 1fr; background: white; }
        .total-bar { background: var(--lidl-blue); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 2rem; font-weight: bold; }

        .numpad-area { display: grid; grid-template-columns: 1fr 120px; gap: 10px; padding: 15px; }
        .grid-3x4 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        button { border: 1px solid #ccc; border-radius: 4px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-num { background: var(--lidl-light-blue); color: white; height: 70px; font-size: 1.5rem; }
        .btn-side { background: #f8f9fa; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.9rem; }
        
        /* VÄRIT KUVISTA */
        .btn-red { background: var(--lidl-red); color: white; }
        .btn-green { background: var(--lidl-green); color: white; }
        .btn-yellow { background: var(--lidl-yellow); color: black; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="left-panel">
    <div class="receipt" id="receipt-list">
        <!-- Tuotteet ilmestyvät tähän -->
    </div>
    <div class="item-controls">
        <button class="btn-side">PAISTO-<br>PISTE</button>
        <button class="btn-side">HEDELMÄT</button>
        <button class="btn-red">PERUUTA</button>
        <button class="btn-side">POISTA<br>RIVI</button>
        <button class="btn-side">MUUTA<br>MÄÄRÄ</button>
        <button class="btn-green" onclick="showPayment()">MAKSUUN</button>
    </div>
</div>

<div id="right-panel">
    <div class="total-bar">
        <span>EUR</span>
        <span id="grand-total">0,00 €</span>
    </div>
    
    <div class="numpad-area">
        <div class="grid-3x4">
            <button class="btn-num">7</button><button class="btn-num">8</button><button class="btn-num">9</button>
            <button class="btn-num">4</button><button class="btn-num">5</button><button class="btn-num">6</button>
            <button class="btn-num">1</button><button class="btn-num">2</button><button class="btn-num">3</button>
            <button class="btn-num">0</button><button class="btn-num">00</button><button class="btn-num">,</button>
        </div>

        <!-- KASSANÄKYMÄN SIVUNÄPPÄIMET (image_2.png) -->
        <div id="side-kassa" class="grid-side" style="display: flex; flex-direction: column; gap: 8px;">
            <button class="btn-side btn-green" style="height: 70px;">PLU</button>
            <button class="btn-side" style="height: 70px;">KPL</button>
            <button class="btn-side btn-yellow" style="height: 150px;" onclick="showPayment()">SUMMA</button>
        </div>

        <!-- MAKSUNÄKYMÄN SIVUNÄPPÄIMET (image_3.png) -->
        <div id="side-maksu" class="hidden" style="display: flex; flex-direction: column; gap: 8px;">
            <button class="btn-side" style="height: 70px;">Lahja-<br>kortti</button>
            <button class="btn-side" style="height: 70px;">Kortti /<br>Cashback</button>
            <button class="btn-side" style="height: 70px;">Kortti</button>
            <button class="btn-side btn-green" style="height: 70px;" onclick="resetKassa()">Bar<br>(Käteinen)</button>
        </div>
    </div>
</div>

<script>
    function showPayment() {
        document.getElementById('side-kassa').classList.add('hidden');
        document.getElementById('side-maksu').classList.remove('hidden');
    }

    function resetKassa() {
        alert("Maksu suoritettu!");
        document.getElementById('side-maksu').classList.add('hidden');
        document.getElementById('side-kassa').classList.remove('hidden');
        document.getElementById('receipt-list').innerHTML = "";
        document.getElementById('grand-total').innerText = "0,00 €";
    }

    // Demo-tuote
    document.getElementById('receipt-list').innerHTML = `
        <div class="item"><span>Maito 1L</span><span>0,95 €</span></div>
        <div class="item"><span>Ruispala</span><span>1,85 €</span></div>
    `;
    document.getElementById('grand-total').innerText = "2,80 €";
</script>

</body>
</html>
