<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Lidl Checkout System 2026</title>
    <style>
        :root {
            --lidl-blue: #0050aa;
            --lidl-light-blue: #00a0e2;
            --lidl-red: #df0000;
            --lidl-green: #2e7d32;
            --lidl-orange: #ff9800;
            --ui-bg: #f4f4f4;
            --text-dark: #333;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; height: 100vh; background: var(--ui-bg); overflow: hidden; }

        /* VASEN PUOLI: KUITTI JA HALLINTA */
        #left-panel {
            display: grid;
            grid-template-rows: 1fr 250px;
            border-right: 2px solid #ccc;
            background: #fff;
        }

        .receipt-container { padding: 10px; overflow-y: auto; }
        .receipt-header { border-bottom: 2px solid var(--lidl-blue); padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        .receipt-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.1rem; }
        
        .left-actions {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            gap: 5px; padding: 10px; background: #eee; border-top: 2px solid #ccc;
        }

        /* OIKEA PUOLI: NUMPAD JA MAKSU */
        #right-panel {
            display: grid;
            grid-template-rows: 60px 1fr;
            background: #fff;
        }

        .top-status { background: var(--lidl-blue); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 1.8rem; font-weight: bold; }

        .numpad-container {
            display: grid; grid-template-columns: 1fr 120px; gap: 10px; padding: 20px;
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad button { 
            height: 80px; border: 1px solid #ccc; background: var(--lidl-light-blue); 
            color: white; font-size: 2rem; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
        .numpad button.action { background: #fff; color: var(--text-dark); border: 2px solid #ccc; }

        .payment-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .btn-side { height: 80px; border: none; border-radius: 5px; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; }
        
        /* VÄRIT KUVIEN MUKAAN */
        .btn-red { background: var(--lidl-red); color: white; }
        .btn-green { background: var(--lidl-green); color: white; }
        .btn-orange { background: var(--lidl-orange); color: white; }
        .btn-gray { background: #9e9e9e; color: white; }

        .total-amount { font-size: 2.5rem; color: #fff; }
    </style>
</head>
<body>

<div id="left-panel">
    <div class="receipt-container">
        <div class="receipt-header"><span>TUOTE</span><span id="total-top">0,00 €</span></div>
        <div id="receipt-list"></div>
    </div>
    <div class="left-actions">
        <button class="btn-side btn-gray">SÄMPYLÄ</button>
        <button class="btn-side btn-gray">PULLA</button>
        <button class="btn-side btn-red">PERUUTA</button>
        <button class="btn-side btn-orange">ETSI</button>
        <button class="btn-side btn-orange">VAAKA</button>
        <button class="btn-side btn-green">SYÖTÄ</button>
        <button class="btn-side btn-gray">LIDL PLUS</button>
        <button class="btn-side btn-gray">PULLO</button>
        <button class="btn-side btn-gray">MUUTA</button>
    </div>
</div>

<div id="right-panel">
    <div class="top-status">
        <span>EUR</span>
        <span class="total-amount" id="grand-total">0,00 €</span>
    </div>
    <div class="numpad-container">
        <div class="numpad" id="numpad-grid">
            <!-- Numpad 7-9 -->
            <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button>
            <!-- Numpad 4-6 -->
            <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button>
            <!-- Numpad 1-3 -->
            <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button>
            <!-- Numpad 0 ja pilkku -->
            <button onclick="num('0')">0</button><button onclick="num('00')">00</button><button onclick="num('.')">,</button>
        </div>
        <div class="payment-sidebar">
            <button class="btn-side btn-gray" onclick="pay('GIFT')">Lahja-<br>kortti</button>
            <button class="btn-side btn-gray" onclick="pay('CARD')">Kortti /<br>Cashback</button>
            <button class="btn-side btn-gray" onclick="pay('CARD')">Kortti</button>
            <button class="btn-side btn-green" onclick="pay('CASH')">Käteinen</button>
        </div>
    </div>
</div>

<script>
    let cart = [];
    let currentInput = "";

    function num(val) {
        currentInput += val;
        // Lidl-logiikka: jos syötetään numeroita ilman tuotetta, se voi olla PLU tai summa
        console.log("Syöte:", currentInput);
    }

    function addProduct(name, price) {
        cart.push({name, price});
        render();
    }

    function render() {
        const list = document.getElementById('receipt-list');
        list.innerHTML = "";
        let total = 0;
        cart.forEach(item => {
            total += item.price;
            list.innerHTML += `<div class="receipt-item"><span>${item.name}</span><span>${item.price.toFixed(2)} €</span></div>`;
        });
        document.getElementById('grand-total').innerText = total.toFixed(2).replace('.', ',') + " €";
        document.getElementById('total-top').innerText = total.toFixed(2).replace('.', ',') + " €";
    }

    function pay(method) {
        if(cart.length === 0) return;
        alert("Suoritetaan maksu: " + method);
        cart = [];
        render();
    }

    // Demo-tuotteita
    addProduct("Banaani kg", 1.29);
    addProduct("Maito 1L", 0.95);
    addProduct("Lidl Ruisleipä", 1.85);
</script>

</body>
</html>
