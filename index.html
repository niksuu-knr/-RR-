<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>R-POS 2026 - Image Responsive</title>
    <style>
        :root {
            --ui-gray: #d1d4d9;
            --ui-dark: #4a4d52;
            --ui-light: #f0f2f5;
            --rk-blue: #0054a6;
            --rk-yellow: #ffcc00;
            --accent-purple: #7b4fb6; /* Mainosruudun väri kuvasta */
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: grid; grid-template-columns: 350px 1fr; height: 100vh; background: var(--ui-gray); overflow: hidden; }

        /* VASEN KOLUMNI (Kuitti + Numpad) */
        #left-panel {
            display: grid;
            grid-template-rows: 250px 1fr 300px;
            background: white;
            border-right: 2px solid #999;
        }

        .ad-space {
            background: var(--accent-purple);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid #999;
        }

        .receipt-area {
            overflow-y: auto;
            padding: 10px;
            font-family: monospace;
            background: #fff;
        }

        .numpad-container {
            background: var(--ui-light);
            border-top: 2px solid #999;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 10px;
            gap: 10px;
        }

        .numpad-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
        }

        .numpad-grid button {
            height: 50px; border: 1px solid #bbb; background: white; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        .num-display {
            grid-column: span 3; background: #fff; border: 1px solid #bbb; height: 40px; text-align: right; padding: 5px 10px; font-size: 1.4rem; margin-bottom: 5px;
        }

        /* OIKEA KOLUMNI (Tuoteruudukko) */
        #main-panel {
            display: grid;
            grid-template-rows: 60px 1fr 80px;
            padding: 10px;
            gap: 10px;
        }

        .top-nav {
            display: flex; gap: 10px; background: white; padding: 10px; border-radius: 4px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* Tiheä ruudukko kuten kuvassa */
            grid-auto-rows: 80px;
            gap: 5px;
        }

        .prod-btn {
            background: #e6e8eb; border: 1px solid #ccc; border-radius: 2px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .prod-btn.active-item { background: var(--ui-dark); color: white; }

        .footer-actions {
            background: var(--ui-dark); display: flex; align-items: center; padding: 0 20px; gap: 10px; border-radius: 4px;
        }

        .pay-btn {
            height: 60px; padding: 0 30px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white;
        }

        /* MODALIT & MUUT */
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; width: 600px; padding: 20px; border-radius: 8px; }
        .total-banner { background: #000; color: #0f0; padding: 15px; text-align: right; font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="left-panel">
    <div class="ad-space" id="ad-box">R-KIOSKI<br>ÄRRÄ-KAHVI<br>2.50€</div>
    <div class="receipt-area" id="receipt-content"></div>
    <div class="numpad-container">
        <div class="numpad-grid">
            <div class="num-display" id="num-in"></div>
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
            <button onclick="press('0')">0</button><button onclick="press('.')">.</button><button onclick="press('C')" style="background:#ff4444; color:white;">C</button>
        </div>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <div class="total-banner" id="total-val">0.00€</div>
            <button class="pay-btn" style="background:#28a745;" onclick="pay('CASH')">KÄTEINEN</button>
            <button class="pay-btn" style="background:#0054a6;" onclick="pay('CARD')">KORTTI</button>
        </div>
    </div>
</div>

<div id="main-panel">
    <div class="top-nav">
        <button onclick="loadCat('fav')">SUOSIKIT</button>
        <button onclick="loadCat('hsl')">HSL</button>
        <button onclick="loadCat('vr')">VR</button>
        <button onclick="showReport('X')">X-RAPORTTI</button>
        <button onclick="showReport('Z')" style="color:red">Z-RAPORTTI</button>
    </div>
    <div class="product-grid" id="grid"></div>
    <div class="footer-actions">
        <span style="color:white">KASSA 01 | MYYJÄ 101 | </span>
        <span id="clock" style="color:var(--rk-yellow)"></span>
    </div>
</div>

<!-- VR MODAALI -->
<div id="vr-overlay" class="overlay">
    <div class="modal">
        <h2>VR LIPUNMYYNTI</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <p>Matkustaja:</p>
                <button onclick="vSet('p','Aikuinen')">Aikuinen</button>
                <button onclick="vSet('p','Lapsi')">Lapsi</button>
            </div>
            <div>
                <p>Tyyppi:</p>
                <button onclick="vSet('t','Meno')">Meno</button>
                <button onclick="vSet('t','Paluu')">Meno-Paluu</button>
            </div>
        </div>
        <br>
        <button onclick="confirmVR()" style="width:100%; padding:15px; background:green; color:white;">LISÄÄ KUITILLE</button>
        <button onclick="document.getElementById('vr-overlay').style.display='none'">PERUUTA</button>
    </div>
</div>

<!-- TERMINAALI -->
<div id="card-overlay" class="overlay">
    <div style="background:#222; color:#0f0; padding:40px; border-radius:10px; text-align:center; font-family:monospace;">
        <h2 id="term-status">ODOTTAA...</h2>
        <p>SYÖTÄ KORTTI</p>
    </div>
</div>

<script>
    let cart = [];
    let numInput = "";
    let sales = { cash: 0, card: 0 };
    let currentVr = { base: 0, name: "", p: "Aikuinen", t: "Meno" };

    const items = {
        fav: [
            {n:"KAHVI M", p:2.50}, {n:"KAHVI L", p:3.20}, {n:"HODARI", p:4.50}, {n:"VESI 0.5", p:2.00},
            {n:"LEHTI", p:5.90}, {n:"DONITSI", p:1.80}, {n:"TUPLA", p:1.20}, {n:"MUOVIKASSI", p:0.30}
        ],
        hsl: [{n:"HSL AB", p:3.10}, {n:"HSL ABC", p:4.10}, {n:"HSL D", p:2.80}],
        vr: [{n:"KAUKO", p:25.00, vr:true}, {n:"LÄHI", p:5.60, vr:true}]
    };

    function press(v) {
        if(v==='C') numInput = "";
        else numInput += v;
        document.getElementById('num-in').innerText = numInput;
    }

    function loadCat(c) {
        const g = document.getElementById('grid');
        g.innerHTML = "";
        // Täytetään ruudukkoa (8x5 = 40 ruutua tyyliin image.png)
        for(let i=0; i<40; i++) {
            const btn = document.createElement('button');
            btn.className = 'prod-btn';
            if(items[c] && items[c][i]) {
                const item = items[c][i];
                btn.innerHTML = `${item.n}<br>${item.p.toFixed(2)}€`;
                btn.onclick = () => item.vr ? openVr(item) : add(item.n, item.p);
            } else {
                btn.disabled = true;
                btn.style.opacity = "0.3";
            }
            g.appendChild(btn);
        }
    }

    function add(n, p) {
        let qty = parseFloat(numInput) || 1;
        cart.push({n, p, qty, total: p * qty});
        numInput = "";
        document.getElementById('num-in').innerText = "";
        render();
    }

    function render(isCash = false) {
        const c = document.getElementById('receipt-content');
        c.innerHTML = "";
        let sub = 0;
        cart.forEach((item, idx) => {
            sub += item.total;
            c.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${item.qty}x ${item.n}</span>
                <span>${item.total.toFixed(2)}€</span>
            </div>`;
        });

        let final = sub;
        if(isCash) final = Math.round(sub * 20) / 20; // 5 sentin pyöristys

        document.getElementById('total-val').innerText = final.toFixed(2) + "€";
    }

    async function pay(m) {
        if(cart.length === 0) return;
        render(m === 'CASH');
        const val = parseFloat(document.getElementById('total-val').innerText);

        if(m === 'CARD') {
            document.getElementById('card-overlay').style.display = 'flex';
            await new Promise(r => setTimeout(r, 2000));
            document.getElementById('term-status').innerText = "HYVÄKSYTTY";
            await new Promise(r => setTimeout(r, 1000));
            document.getElementById('card-overlay').style.display = 'none';
            document.getElementById('term-status').innerText = "ODOTTAA...";
            sales.card += val;
        } else {
            sales.cash += val;
            alert("KÄTEINEN OK. VAIHTORAHAA: " + (numInput ? (parseFloat(numInput)-val).toFixed(2) : "0.00") + "€");
        }
        
        cart = [];
        numInput = "";
        render();
    }

    function openVr(item) {
        currentVr = { base: item.p, name: item.n, p: "Aikuinen", t: "Meno" };
        document.getElementById('vr-overlay').style.display = 'flex';
    }

    function vSet(k, v) { currentVr[k] = v; }

    function confirmVR() {
        let price = currentVr.base;
        if(currentVr.p === "Lapsi") price *= 0.5;
        if(currentVr.t === "Paluu") price *= 2;
        add(currentVr.name + " (" + currentVr.p + ")", price);
        document.getElementById('vr-overlay').style.display = 'none';
    }

    function showReport(type) {
        const total = sales.cash + sales.card;
        alert(`--- ${type}-RAPORTTI ---\nKäteinen: ${sales.cash.toFixed(2)}€\nKortti: ${sales.card.toFixed(2)}€\nYhteensä: ${total.toFixed(2)}€`);
        if(type === 'Z') sales = { cash: 0, card: 0 };
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    loadCat('fav');
</script>

</body>
</html>
