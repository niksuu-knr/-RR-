<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --lidl-header-blue: #2a5298;
            --numpad-blue: #b3e5fc;
            --action-green: #4caf50;
            --action-red: #ef5350;
            --action-yellow: #ffeb3b;
            --action-cyan: #81d4fa;
            --bg-gray: #cfd8dc;
            --border: #90a4ae;
        }

        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; background: var(--bg-gray); display: grid; grid-template-columns: 45% 55%; height: 100vh; padding: 5px; gap: 5px; }

        /* VASEN PUOLI */
        #left-col { display: grid; grid-template-rows: 1fr 180px; gap: 5px; }
        
        .receipt-container { background: white; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .receipt-header { background: var(--lidl-header-blue); color: white; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        .receipt-list { flex-grow: 1; padding: 10px; font-size: 0.9rem; }

        .left-bottom-grid { 
            background: #eceff1; border: 1px solid var(--border); 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; padding: 5px;
        }

        /* OIKEA PUOLI */
        #right-col { 
            background: white; border: 1px solid var(--border); 
            display: grid; grid-template-rows: 130px 1fr; padding: 5px; gap: 5px;
        }

        .top-action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        
        .main-interaction-area { display: grid; grid-template-columns: 1fr 80px; gap: 5px; }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }

        /* PAINIKKEET */
        button { border: 1px solid #b0bec5; border-radius: 2px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        
        .btn-num { background: var(--numpad-blue); height: 100%; font-size: 1.5rem; }
        .btn-red { background: var(--action-red); color: white; }
        .btn-green { background: var(--action-green); color: white; }
        .btn-yellow { background: var(--action-yellow); }
        .btn-cyan { background: var(--action-cyan); }
        .btn-white { background: white; }

        .right-sidebar { display: grid; grid-template-rows: repeat(4, 1fr); gap: 5px; }

        .total-box { font-size: 2rem; }
    </style>
</head>
<body>

<div id="left-col">
    <div class="receipt-container">
        <div class="receipt-header">
            <span>Kassanäkymä</span>
            <span class="total-box">45,39 €</span>
        </div>
        <div class="receipt-list">
            <!-- Sisältö kuten kuvassa Näyttökuva 2026-05-13 173430.png -->
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Tuoteesimerkki 1</span><span>1,99</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Tuoteesimerkki 2</span><span>2,49</span></div>
        </div>
    </div>
    
    <div class="left-bottom-grid">
        <button class="btn-cyan">Pika 1</button><button class="btn-cyan">Pika 2</button><button class="btn-white"></button><button class="btn-white"></button>
        <button class="btn-white"></button><button class="btn-white"></button><button class="btn-red">Storno</button><button class="btn-yellow">Rabatt</button>
        <button class="btn-white"></button><button class="btn-red">Pfand</button><button class="btn-white"></button><button class="btn-white"></button>
    </div>
</div>

<div id="right-col">
    <div class="top-action-grid">
        <button class="btn-red">Storno</button>
        <button class="btn-red">Bon-Abbruch</button>
        <button class="btn-green">Lidl Plus</button>
        <button class="btn-cyan">Menge</button>
    </div>
    
    <div class="main-interaction-area">
        <div class="numpad">
            <button class="btn-num">7</button><button class="btn-num">8</button><button class="btn-num">9</button>
            <button class="btn-num">4</button><button class="btn-num">5</button><button class="btn-num">6</button>
            <button class="btn-num">1</button><button class="btn-num">2</button><button class="btn-num">3</button>
            <button class="btn-num">0</button><button class="btn-num">00</button><button class="btn-num">,</button>
        </div>
        
        <div class="right-sidebar">
            <button class="btn-green">PLU</button>
            <button class="btn-white">X</button>
            <button class="btn-yellow" onclick="alert('MA painettu')">Summe</button>
            <button class="btn-green">Ent.</button>
        </div>
    </div>
</div>

</body>
</html>
